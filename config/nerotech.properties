#NeroTech config (managed by Neroland Core). Tier-1 Earth machine balance.
#machineEnergyCapacity: internal NE buffer of every Tier-1 machine (default 100000; server-authoritative)
#machineMaxTransfer: max NE/tick a machine accepts or emits per side (default 2000; server-authoritative)
#neroGeneratorNePerTick: NE/tick produced by the Nero Generator while burning fuel (default 40; server-authoritative)
#solarArrayNePerTick: NE/tick produced by the Solar Array in full daylight with sky access (default 10; server-authoritative)
#machineBaseProcessTicks: base ticks one Ore Processor / Fabricator operation takes (before Speed modules) (default 120; server-authoritative)
#machineNePerTick: base NE/tick a processing machine consumes while working (before Efficiency) (default 30; server-authoritative)
#heatCapacity: max heat units a machine can hold (gauge scale) (default 1000; server-authoritative)
#heatPerOperation: heat added each working tick (generators: per burn tick) (default 4; server-authoritative)
#heatDissipationPerTick: heat shed passively each tick (extra when next to water/ice/snow) (default 1; server-authoritative)
#heatThrottleThreshold: processing machines stall once heat reaches this (must cool to resume) (default 800; server-authoritative)
#pollutionPerOperation: pollution a machine emits per contribution (0 disables; solar emits none) (default 2; server-authoritative)
#pollutionContributionIntervalTicks: how often (ticks) a running machine adds to its region (batched, not per-tick) (default 40; server-authoritative)
#pollutionDecayIntervalTicks: how often (ticks) regional pollution decays server-wide (default 200; server-authoritative)
#pollutionDecayAmount: pollution removed from each region per decay step (default 1; server-authoritative)
#pollutionPerPlayerAttribution: OFF by default (privacy): when true, pollution is attributed to the placing player's UUID (POPIA/GDPR: UUIDs only, retention-pruned, erasable via the shared data-erasure hook) (default false; server-authoritative)
#pollutionAttributionRetentionDays: days to keep per-player pollution attribution before pruning (0 = keep until erased) (default 30; server-authoritative)
#fusionReactorNePerTick: NE/tick the Fusion Reactor produces while running (high-output late-game) (default 400; server-authoritative)
#fusionReactorMeltdownEnabled: true: an unmanaged Fusion Reactor melts down destructively at max heat (telegraphed by the red gauge); false (survival-friendly): it just stalls until it cools (default true; server-authoritative)
#advancedOreProcessorYieldBonus: extra dust the Advanced Ore Processor yields over the Tier-1 processor (default 1; server-authoritative)
#solarDimensionMultipliers: DEFERRED per-planet solar fallback (until a Nerospace planet-trait API exists): comma-list of dimensionId=multiplier, e.g. nerospace:greenxertz=1.5,nerospace:glacira=0.6 (Earth defaults to 1.0) (default ; server-authoritative)
#telemetryEnabled: anonymous error reporting to the developers (stack trace + mod/MC/loader/OS/Java versions only \u2014 never names, UUIDs, IPs, or world data; POPIA/GDPR-compliant). Set false to opt out (default true)
#Mon Jun 29 18:30:45 SAST 2026
advancedOreProcessorYieldBonus=1
fusionReactorMeltdownEnabled=true
fusionReactorNePerTick=400
heatCapacity=1000
heatDissipationPerTick=1
heatPerOperation=4
heatThrottleThreshold=800
machineBaseProcessTicks=120
machineEnergyCapacity=100000
machineMaxTransfer=2000
machineNePerTick=30
neroGeneratorNePerTick=40
pollutionAttributionRetentionDays=30
pollutionContributionIntervalTicks=40
pollutionDecayAmount=1
pollutionDecayIntervalTicks=200
pollutionPerOperation=2
pollutionPerPlayerAttribution=false
solarArrayNePerTick=10
solarDimensionMultipliers=
telemetryEnabled=true
