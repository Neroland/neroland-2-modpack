#NeroLink companion-bridge configuration.
#enabled: Master switch. When false the bridge binds no socket and serves nothing. (default true; server-authoritative)
#port: TCP port the HTTP + WebSocket bridge binds (server-start). Change needs a restart. (default 25580; server-authoritative)
#bindAddress: Interface the bridge binds. 0.0.0.0 = all; 127.0.0.1 = local/relay-forward only. (default 0.0.0.0; server-authoritative)
#rateLimitPerMinute: Per-token REST request budget per rolling minute. 429 + retryAfterMs on breach. (default 60; server-authoritative)
#maxClients: Global cap on concurrent paired clients (REST + WS). Protects a busy server. (default 64; server-authoritative)
#tokenExpiryDays: Device tokens expire after this many days of inactivity (lazily on next use). (default 90; server-authoritative)
#readOnly: Read-only bridge: all POST /actions are refused with ACTION_DISABLED. Snapshots still served. (default false; server-authoritative)
#allowOfflineActions: When false, every action requires the player be online, ignoring each action's allowOffline flag. (default true; server-authoritative)
#actionsDisabled: Comma-separated module/action ids to disable globally, e.g. "nerologistics/craft_order,core/ack_alert". (default ; server-authoritative)
#snapshotCadenceHotMs: Cache cadence for hot sections (energy, drones). WS deltas batch to at most one per second. (default 5000; server-authoritative)
#snapshotCadenceColdMs: Cache cadence for cold sections (stock, storage). (default 30000; server-authoritative)
#relayOrigin: Relay base origin used by /nerolink setup to register this server, e.g. https://nerorelay.neroserver.xyz. /nerolink setup [origin] posts to <origin>/register and stores the returned credentials per-world; you do not edit relayUrl/relayKey by hand. (default https://nerorelay.neroserver.xyz; server-authoritative)
#relayUrl: MANUAL OVERRIDE (advanced): relay tunnel URL, e.g. wss://nerorelay.neroserver.xyz/tunnel/<serverId>. Blank = use the /nerolink setup registration instead. When BOTH relayUrl and relayKey are set they take precedence over the stored setup registration; otherwise leave both blank and use /nerolink setup. (default ; server-authoritative)
#relayKey: MANUAL OVERRIDE (advanced): server key paired with relayUrl - keep secret, never logged. Blank = use the /nerolink setup registration instead. Set BOTH relayUrl and relayKey to override the stored setup credentials; otherwise leave blank and use /nerolink setup. (default ; server-authoritative)
#privacyNoticeText: Data-processing notice returned by GET /privacy/notice and shown at first pairing. (default This server's NeroLink bridge stores only: a hashed device token, your notification preferences, and pending pairing codes - all keyed to your Minecraft account and erasable on request. No email, no location, no chat. All data shown is scoped to you.)
#telemetryEnabled: Anonymous error reporting to the developers (stack trace + mod/MC/loader/OS/Java versions only \u2014 never tokens, pairing codes, relay keys, names, UUIDs, IPs, or world data; POPIA/GDPR-compliant, EU servers). Set false to opt out. (default true)
#Wed Jul 08 16:41:55 SAST 2026
actionsDisabled=
allowOfflineActions=true
bindAddress=0.0.0.0
enabled=true
maxClients=64
port=25580
privacyNoticeText=This server's NeroLink bridge stores only\: a hashed device token, your notification preferences, and pending pairing codes - all keyed to your Minecraft account and erasable on request. No email, no location, no chat. All data shown is scoped to you.
rateLimitPerMinute=60
readOnly=false
relayKey=
relayOrigin=https\://nerorelay.neroserver.xyz
relayUrl=
snapshotCadenceColdMs=30000
snapshotCadenceHotMs=5000
telemetryEnabled=true
