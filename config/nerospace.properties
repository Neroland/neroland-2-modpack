#Nerospace config (managed by Neroland Core). All multipliers 0.1..10, default 1.
#telemetryEnabled: send anonymous, Nerospace-only crash reports (Sentry, EU servers) - stack trace, mod/MC/loader/OS/Java versions, your other installed mods, this mod's config, recent in-game actions, anonymous stability/timing; no IP, username, UUID, world data or chat; file paths scrubbed of your account name. false = opt out of all of it. See PRIVACY.md (default true)
#energyRateMultiplier: scales FE/tick of all generators (combustion, passive, solar) (default 1.0; server-authoritative)
#oxygenDrainMultiplier: scales how fast air drains off a safe zone (default 1.0; server-authoritative)
#oxygenCapacityMultiplier: scales player + suit air capacity (default 1.0; server-authoritative)
#fuelCostMultiplier: scales fuel burned per rocket launch (clamped to the tank) (default 1.0; server-authoritative)
#machineSpeedMultiplier: scales machine work speed (higher = faster) (default 1.0; server-authoritative)
#gravityMultiplier: global scale on per-dimension/per-biome gravity (higher = stronger) (default 1.0; server-authoritative)
#quarryMaxSide: max quarry landmark claim side in blocks (4..64, default 64) (default 64; server-authoritative)
#quarryFrameDecayTicks: base delay in ticks before an orphaned quarry frame block crumbles and drops its casing; each block waits base + rand(base*7), so the default 600 spreads the ring's decay over ~30s..4min (20..24000) (default 600; server-authoritative)
#alienRaidsEnabled: allow hostile mobs to raid alien villages at night (true by default; false = opt out) (default true; server-authoritative)
#terraformerForceLoadEnabled: a running Terraformer keeps a small window of chunks loaded so it terraforms while you are away (false by default; opt-in - costs server memory/TPS while it runs) (default false; server-authoritative)
#Wed Jul 08 16:41:55 SAST 2026
alienRaidsEnabled=true
energyRateMultiplier=1.0
fuelCostMultiplier=1.0
gravityMultiplier=1.0
machineSpeedMultiplier=1.0
oxygenCapacityMultiplier=1.0
oxygenDrainMultiplier=1.0
quarryFrameDecayTicks=600
quarryMaxSide=64
telemetryEnabled=true
terraformerForceLoadEnabled=false
