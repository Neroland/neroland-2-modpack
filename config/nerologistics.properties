#NeroLogistics config (managed by Neroland Core). Local-transport (duct/cable) balance.
#itemTransferPerTick: max items moved per item network per tick (default 64; server-authoritative)
#fluidTransferPerTick: max mB moved per fluid network per tick (default 1000; server-authoritative)
#energyTransferPerTick: max NE moved per energy network per tick (default 2560; server-authoritative)
#maxNodesPerNetwork: max conduits in one network; a conduit that would exceed it stays isolated (no lag spiral) (default 2000; server-authoritative)
#enableController: master toggle for the network controller's managed throughput boost (default true; server-authoritative)
#controllerUpkeepPerTick: NE drawn per tick to keep a controller powered; below this the controller manages at base speed (default 8; server-authoritative)
#controllerModuleBonusPercent: throughput bonus (%) each connected network module adds to a powered controller (default 25; server-authoritative)
#controllerMaxModules: max network modules a single controller counts (bounds the flood-fill) (default 16; server-authoritative)
#controllerMaxPercent: cap on a controller's managed throughput multiplier (100 = no boost) (default 500; server-authoritative)
#enableTrains: master toggle for native train stations (default true; server-authoritative)
#trainStationIntervalTicks: ticks between a load station's bulk haul attempts (default 100; server-authoritative)
#trainTicksPerBlock: transit ticks added per block of distance between stations (slower = more travel feel) (default 2; server-authoritative)
#trainMinTransitTicks: minimum transit time for a train haul (default 40; server-authoritative)
#trainMaxRange: max block distance a load station ships to an unload station (default 2048; server-authoritative)
#trainBulkPerTrip: max buffer slots a station hauls per trip (bulk) (default 27; server-authoritative)
#maxDronesPerPort: hard cap on drones (parallel lanes) a single drone port counts (default 8; server-authoritative)
#dronePortRange: max block distance an export port will ship to an import port (default 256; server-authoritative)
#dronePerDroneCapacity: items each drone carries per dispatch (throughput = drones × this) (default 16; server-authoritative)
#dronePortEnergyPerStack: NE charged per drone dispatch from a port (default 256; server-authoritative)
#enableBuffers: master toggle for keep-stocked buffer leveling (passive buffers always hold) (default true; server-authoritative)
#bufferIntervalTicks: ticks between a keep-stocked buffer's top-up/overflow passes (default 20; server-authoritative)
#enableAutoCrafting: master toggle for the auto-crafter (default true; server-authoritative)
#craftIntervalTicks: ticks between an auto-crafter's crafting passes (default 20; server-authoritative)
#autoCraftEnergyPerCraft: NE charged per item crafted by an auto-crafter (default 200; server-authoritative)
#autoCraftsPerInterval: base crafts an auto-crafter runs per interval (scaled by the managing controller's capacity) (default 4; server-authoritative)
#wirelessRange: max block distance between two wireless terminals on the same channel (default 64; server-authoritative)
#wirelessEnergyPerItem: NE charged per item moved over a wireless channel (default 16; server-authoritative)
#wirelessIntervalTicks: ticks between wireless-channel transport passes (query batching window) (default 10; server-authoritative)
#droneRange: max block distance a delivery drone will travel from its hub (default 48; server-authoritative)
#dronesPerHub: hard cap on live drone entities a single hub may have in flight (default 4; server-authoritative)
#droneEnergyPerDelivery: NE charged per drone delivery dispatched (default 512; server-authoritative)
#shipTransitTicks: transit time (ticks) for a cross-dimension cargo shipment (default 1200; server-authoritative)
#shipEnergyPerStack: NE charged per stack in a shipment (deliberately expensive) (default 10000; server-authoritative)
#shipFuelPerLaunch: rocket-fuel-tagged items consumed per launch (default 1; server-authoritative)
#shipIntervalTicks: ticks between a cargo port's auto-ship attempts (default 100; server-authoritative)
#perPlayerThroughputAttribution: opt-in: attribute cargo-port shipments to the placing player (UUID only); off = no player data (default false; server-authoritative)
#attributionRetentionDays: days to retain per-player attribution before auto-prune (0 = keep until erased) (default 30; server-authoritative)
#enableWireless: master toggle for wireless cargo terminals (default true; server-authoritative)
#enableDrones: master toggle for drone hubs + delivery drones (default true; server-authoritative)
#enableCrossDimension: master toggle for rocket cargo ports / cross-dimension shipping (default true; server-authoritative)
#maxPendingShipments: hard cap on in-transit shipments; ports stop launching at the cap (no unbounded queue) (default 1024; server-authoritative)
#telemetryEnabled: anonymous error reporting to the developers (stack trace + mod/MC/loader/OS/Java versions only \u2014 never names, UUIDs, IPs, or world data; POPIA/GDPR-compliant). Set false to opt out (default true)
