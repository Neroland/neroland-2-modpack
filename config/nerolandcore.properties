#Neroland Core configuration.
#materialHardnessMultiplier: Global multiplier on Nero material block hardness. (default 1.0; server-authoritative)
#materialBlastResistanceMultiplier: Global multiplier on Nero material block blast resistance. (default 1.0; server-authoritative)
#upgradeModuleSlotCap: Maximum upgrade-module slots any machine may expose. (default 4; server-authoritative)
#upgradeStackingDiminish: Diminishing factor on stacked identical upgrade modules (1.0 = linear, lower = stronger falloff). (default 1.0; server-authoritative)
#neroEnergyToForgeEnergyRatio: Conversion ratio: 1 Nero energy unit equals N Forge Energy (rough parity by default). (default 1.0; server-authoritative)
#meteorTierBaseWeightCommon: Base selection weight for common-tier grindable meteor materials (primary pool). (default 60; server-authoritative)
#meteorTierBaseWeightUncommon: Base selection weight for uncommon-tier grindable meteor materials (primary pool). (default 25; server-authoritative)
#meteorTierBaseWeightRare: Base selection weight for rare-tier grindable meteor materials (primary pool). (default 12; server-authoritative)
#meteorPlanetBias: Weight multiplier applied to a material when grinding inside its bound planet's dimension. (default 2.0; server-authoritative)
#meteorExoticChance: Probability per finished grind that the separate exotic bonus pool also fires. (default 0.08; server-authoritative)
#sideConfigAutoTransferRate: Per-tick auto-eject/auto-input transfer rate per face: NE for energy, mB for fluid/gas, item count for the item channel. 0 disables auto-transfer (manual/pipe routing only). (default 256; server-authoritative)
#dataRetentionDays: Days of inactivity after which a player's stored data is purged (0 = never; opt-in). (default 0)
#debugLogging: Verbose Neroland Core debug logging (local only). (default false)
#telemetryEnabled: Send anonymous, Neroland-Core-only crash reports (Sentry, EU servers): stack trace, mod/MC/loader/OS/Java versions, your other installed mods, this mod's config, and anonymous stability/timing data; no IP, username, UUID, world data or chat; file paths are scrubbed of your account name. Set false to opt out. See PRIVACY.md. (default true)
#Mon Jun 29 18:31:40 SAST 2026
dataRetentionDays=0
debugLogging=false
materialBlastResistanceMultiplier=1.0
materialHardnessMultiplier=1.0
meteorExoticChance=0.08
meteorPlanetBias=2.0
meteorTierBaseWeightCommon=60
meteorTierBaseWeightRare=12
meteorTierBaseWeightUncommon=25
neroEnergyToForgeEnergyRatio=1.0
sideConfigAutoTransferRate=256
telemetryEnabled=true
upgradeModuleSlotCap=4
upgradeStackingDiminish=1.0
