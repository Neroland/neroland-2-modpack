name: Bug / recipe / quest issue
description: Something works incorrectly (recipe, quest, config, balance)
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: Pack version
      placeholder: "1.0.0"
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options: [Recipe, Quest, Config, Balance, Other]
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Describe the issue
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: false
